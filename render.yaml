services:
  - type: worker
    name: telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # set manually in Render dashboard
      - key: FORCE_JOIN_CHANNEL
        sync: false          # e.g. @YourChannel  or  -1001234567890
      - key: DB_PATH
        value: /data/bot.db  # persistent disk mount path

disk:
  name: bot-data
  mountPath: /data
  sizeGB: 1
